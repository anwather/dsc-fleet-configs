# yaml-language-server: $schema=https://aka.ms/dsc/schemas/v3/bundled/config/document.json
$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
metadata:
  Microsoft.DSC:
    securityContext: elevated
  description: |
    Install ACME Agent from a signed MSI on the corporate file share.
    Uses PSDscResources/MsiPackage (Microsoft-maintained replacement for the
    built-in MsiPackage resource) via the Microsoft.Windows/WindowsPowerShell
    adapter, which is required for MOF-based / function-based PSDSC resources.
parameters:
  msiSourcePath:
    type: string
    defaultValue: \\fileshare01.contoso.local\packages\AcmeAgent\AcmeAgent-1.4.0.msi
  productId:
    type: string
    defaultValue: '{8E9A3C2A-1C7C-4F31-9F1A-AAAAAAAAAAAA}'
resources:
  - name: ACME Agent MSI
    type: Microsoft.Windows/WindowsPowerShell
    properties:
      resources:
        - name: Install ACME Agent
          type: PSDscResources/MsiPackage
          properties:
            ProductId: "[parameters('productId')]"
            Path:      "[parameters('msiSourcePath')]"
            Ensure:    Present
            Arguments: /qn /norestart REBOOT=ReallySuppress

