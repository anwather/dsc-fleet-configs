name: ci

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate-configs:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dsc CLI (pinned)
        shell: pwsh
        run: |
          winget install --id Microsoft.DSC --exact --silent --version 3.1.3 `
            --accept-package-agreements --accept-source-agreements
          dsc --version

      - name: Run Pester tests (schema + dsc parse)
        shell: pwsh
        run: |
          Remove-Item "$env:LOCALAPPDATA/dsc/PSAdapterCache.json" -ErrorAction Ignore
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          $r = Invoke-Pester -Path tests/Pester -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed." }
